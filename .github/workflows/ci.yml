name: Frontend Security CI 
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow-dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Linting 
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  secret-scan:
    name: Scanning secret leaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: gitleaks.toml
 
  license-collection:
    name: Collect dependency licenses
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate License Inventory
        run: |
          echo "### Production Dependency Licenses" >> $GITHUB_STEP_SUMMARY
          npx license-checker --production --summary >> $GITHUB_STEP_SUMMARY
          npx license-checker --production --json --out licenses-inventory.json

      - name: Upload License Inventory
        uses: actions/upload-artifact@v4
        with:
          name: production-license-inventory
          path: licenses-inventory.json


  # This is repetitive as Team 2 does SAST (codeql-action), SCA (npm audit), which is also done here
  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high --json > audit-results.json || true
      - uses: actions/upload-artifact@v5
        with:
          name: npm-audit-results
          path: audit-results.json
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v4

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: cp public/sitemap.xml dist/sitemap.xml
      - uses: actions/upload-artifact@v5
        with:
          name: build-output
          path: dist/
          retention-days: 7

  accessibility-audit:
    name: Accessibility audit
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - uses: actions/download-artifact@v5
        with:
          name: build-output
          path: dist/
      - run: npx serve -s dist -l 5000 &
      - run: npx wait-on http://localhost:5000 --timeout 30000
      - run: npx pa11y-ci --sitemap http://localhost:5000/sitemap.xml --config .pa11yci.json

  performance-audit:
    name: Performance audit
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          name: build-output
          path: dist/
      - uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: './lighthouserc.json'
